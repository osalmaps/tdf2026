<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tour de France 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --jaune:#FFD400; --vert:#16A34A; --pois:#E11D2E; --blanc:#fff;
    --ink:#15171C; --ink-soft:#5A6068; --paper:#F6F4EE; --line:#E2DDD1; --card:#fff;
    --shadow:0 1px 0 rgba(21,23,28,.04), 0 12px 28px -18px rgba(21,23,28,.35);
    --display:'Saira Condensed','Arial Narrow',system-ui,sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#ECECEC; --ink-soft:#9AA0A8; --paper:#14151A; --line:#2A2D34; --card:#1C1E24;
      --shadow:0 1px 0 rgba(0,0,0,.2), 0 12px 28px -18px rgba(0,0,0,.8); }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.45;-webkit-text-size-adjust:100%}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(120% 90% at 80% -10%, rgba(255,212,0,.10), transparent 55%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600'><g fill='none' stroke='%23808080' stroke-opacity='0.10' stroke-width='1'><path d='M-20 120 C120 60 200 180 340 120 S560 60 640 140'/><path d='M-20 200 C120 140 200 260 340 200 S560 140 640 220'/><path d='M-20 280 C120 220 200 340 340 280 S560 220 640 300'/><path d='M-20 360 C120 300 200 420 340 360 S560 300 640 380'/><path d='M-20 440 C120 380 200 500 340 440 S560 380 640 460'/><path d='M-20 520 C120 460 200 580 340 520 S560 460 640 540'/></g></svg>");}
  .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:18px 16px 64px}

  .masthead{border-bottom:3px solid var(--ink);padding-bottom:14px}
  .topline{display:flex;justify-content:flex-end;margin-bottom:10px}
  .langsw{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .langsw button{border:0;background:transparent;cursor:pointer;font-family:var(--display);font-weight:700;
    font-size:12px;letter-spacing:.08em;padding:5px 11px;border-radius:999px;color:var(--ink-soft)}
  .langsw button[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
  .jerseybar{display:flex;height:7px;border-radius:4px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
  .jerseybar i{flex:1}
  .eyebrow{font-family:var(--display);font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:12px;color:var(--ink-soft)}
  h1{font-family:var(--display);font-weight:800;line-height:.92;margin:.12em 0 .1em;font-size:clamp(40px,11vw,68px);text-transform:uppercase}
  .route{font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:.04em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .route .dot{width:7px;height:7px;border-radius:50%;background:var(--pois);display:inline-block}
  .route .seg{flex:1;min-width:30px;height:2px;background:repeating-linear-gradient(90deg,var(--ink) 0 8px,transparent 8px 14px)}
  .factbar{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .fact{display:flex;flex-direction:column}
  .fact .n{font-family:var(--display);font-weight:800;font-size:26px;line-height:1}
  .fact .l{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-top:3px}
  .fact.cd .n{color:var(--pois)}

  .namebar{display:flex;gap:10px;align-items:flex-end;margin:18px 0 0}
  .namebar .grow{flex:1}
  .livedot{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);padding-bottom:11px}
  .livedot i{width:8px;height:8px;border-radius:50%;background:var(--ink-soft)}
  .livedot.on i{background:var(--vert);box-shadow:0 0 0 3px rgba(22,163,74,.18)}

  .tabs{display:flex;gap:4px;margin:14px 0 18px;background:color-mix(in srgb, var(--ink) 8%, transparent);padding:4px;border-radius:12px}
  .tab{flex:1;border:0;background:transparent;cursor:pointer;font-family:var(--display);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:13px;padding:10px 4px;border-radius:9px;color:var(--ink-soft)}
  .tab[aria-selected="true"]{background:var(--ink);color:var(--paper);box-shadow:var(--shadow)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .card-h .jsvg{width:38px;height:38px;flex:none}
  .card-h .t{font-family:var(--display);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:19px;line-height:1}
  .card-h .s{font-size:12px;color:var(--ink-soft)}
  .pts{margin-left:auto;font-family:var(--display);font-weight:800;font-size:15px;color:var(--ink-soft);border:1px solid var(--line);border-radius:999px;padding:2px 10px;white-space:nowrap}

  label.fld{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 6px}
  input[type=text],input[type=number],select{width:100%;font-family:var(--body);font-size:16px;color:var(--ink);background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;appearance:none}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14'><path d='M3 5l4 4 4-4' fill='none' stroke='%23808080' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
  input:focus,select:focus{outline:none;border-color:var(--ink)}
  select:disabled{opacity:.6;cursor:not-allowed}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .other{margin-top:8px}
  .hint{font-size:12px;color:var(--ink-soft);margin:6px 0 0}

  .seg-toggle{display:flex;gap:8px}
  .seg-toggle button{flex:1;font-family:var(--display);font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.06em;padding:11px;border:1.5px solid var(--line);background:var(--card);border-radius:10px;cursor:pointer;color:var(--ink-soft)}
  .seg-toggle button[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .cta{width:100%;border:0;cursor:pointer;font-family:var(--display);font-weight:800;text-transform:uppercase;letter-spacing:.06em;font-size:18px;color:#15171C;background:var(--jaune);padding:15px;border-radius:12px;box-shadow:var(--shadow);margin-top:4px}
  .cta:disabled{background:color-mix(in srgb, var(--ink) 12%, transparent);color:var(--ink-soft);cursor:not-allowed;box-shadow:none}
  .toast{font-size:13px;text-align:center;margin-top:10px;min-height:18px;font-weight:600}
  .toast.ok{color:var(--vert)} .toast.err{color:var(--pois)}

  .stage{display:grid;grid-template-columns:46px 1fr;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .stage:last-child{border-bottom:0}
  .stage .num{font-family:var(--display);font-weight:800;font-size:21px;text-align:center;line-height:1;border:2px solid var(--ink);border-radius:9px;padding:6px 0;height:fit-content}
  .stage.locked .num{border-color:var(--line);color:var(--ink-soft)}
  .stage .meta{display:flex;flex-direction:column;gap:7px;min-width:0}
  .stage .top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .stage .rte{font-weight:600;font-size:15px}
  .stage .dt{font-size:11px;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase}
  .chip{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .chip.flat{background:#E8F2FB;color:#1D6FB8} .chip.hills{background:#FCEFE0;color:#B5701B}
  .chip.mountains{background:#FBE6E8;color:#B21D2A} .chip.itt,.chip.ttt{background:#ECEAFB;color:#5b4bb8}
  .stage .win{font-size:13px}
  .rest{display:flex;align-items:center;gap:10px;padding:11px 0 11px 58px;color:var(--ink-soft);font-family:var(--display);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:13px;border-bottom:1px solid var(--line)}
  .stagewrap-foot{position:sticky;bottom:10px;margin-top:6px}
  .savepill{font-size:12px;color:var(--vert);font-weight:600;min-height:16px;margin-top:6px}

  .lb-row{display:grid;grid-template-columns:30px 1fr auto;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .lb-row:last-child{border-bottom:0}
  .rank{font-family:var(--display);font-weight:800;font-size:20px;color:var(--ink-soft);text-align:center}
  .lb-row.lead .rank{color:var(--pois)}
  .who{font-weight:600}
  .subline{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .mini{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .mini i{width:14px;height:14px;border-radius:3px;border:1px solid rgba(128,128,128,.25);display:inline-block}
  .mini i.miss{opacity:.22}
  .score{font-family:var(--display);font-weight:800;font-size:24px;text-align:right;line-height:1}
  .score small{display:block;font-family:var(--body);font-weight:500;font-size:11px;color:var(--ink-soft);letter-spacing:.06em}
  .empty{text-align:center;color:var(--ink-soft);padding:26px 10px;font-size:14px}
  details.brk{margin-top:10px}
  details.brk summary{cursor:pointer;font-size:12px;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase}
  .brk-grid{font-size:13px;margin-top:8px;display:grid;grid-template-columns:1fr auto;gap:3px 12px}
  .brk-grid .g{color:var(--vert);font-weight:600} .brk-grid .x{color:var(--ink-soft)}

  .gate{text-align:center;padding:14px 4px}
  .gate input{max-width:160px;margin:10px auto 0;text-align:center;letter-spacing:.4em;font-weight:700}
  .saved-flag{font-size:12px;color:var(--vert);font-weight:600;margin-top:8px;text-align:center;min-height:16px}

  footer{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);line-height:1.6}
  .credit{font-family:var(--display);letter-spacing:.1em;text-transform:uppercase;margin-top:8px}
  @media(max-width:480px){ .twocol{grid-template-columns:1fr} .factbar{gap:14px} }
</style>
</head>

        <button data-lang="no" aria-pressed="false">NO</button>
        <button data-lang="sv" aria-pressed="false">SV</button>
        <button data-lang="da" aria-pressed="false">DA</button>
      </div>
    </div>
    <div class="jerseybar"><i style="background:var(--jaune)"></i><i style="background:var(--vert)"></i><i style="background:var(--pois)"></i><i style="background:#fff;box-shadow:inset 0 0 0 1px var(--line)"></i></div>
    <div class="eyebrow" data-i18n="eyebrow"></div>
    <h1 id="title">Tour de France 2026</h1>
    <div class="route"><span class="dot"></span>Barcelona<span class="seg"></span>Paris · Montmartre<span class="dot"></span></div>
    <div class="factbar">
      <div class="fact cd"><span class="n" id="cd">—</span><span class="l" data-i18n="cd_label"></span></div>
      <div class="fact"><span class="n">21</span><span class="l" data-i18n="fact_stages"></span></div>
      <div class="fact"><span class="n">3 333</span><span class="l">km</span></div>
      <div class="fact"><span class="n">54 450</span><span class="l" data-i18n="fact_climb"></span></div>
    </div>
  </header>

  <div class="namebar">
    <div class="grow">
      <label class="fld" for="me" data-i18n="riding_as"></label>
      <input type="text" id="me" data-i18n-ph="name_ph" autocomplete="off">
    </div>
    <span class="livedot" id="live"><i></i><span id="livetxt"></span></span>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" aria-selected="true"  data-tab="predict" data-i18n="tab_jerseys"></button>
    <button class="tab" role="tab" aria-selected="false" data-tab="stages"  data-i18n="tab_stages"></button>
    <button class="tab" role="tab" aria-selected="false" data-tab="board"   data-i18n="tab_board"></button>
    <button class="tab" role="tab" aria-selected="false" data-tab="results" data-i18n="tab_results"></button>
  </div>

  <section id="predict"></section>
  <section id="stages" hidden></section>
  <section id="board" hidden></section>
  <section id="results" hidden></section>

  <footer>
    <div data-i18n="footer_scoring"></div>
    <div data-i18n="footer_locks" style="margin-top:6px"></div>
    <div class="credit">Allez allez allez</div>
  </footer>
</div>

let backend, preds = {}, results = {};
function localBackend(){
  const read=k=>{ try{return JSON.parse(localStorage.getItem(k)||"null");}catch(e){return null;} };
  const P="tdf2026_predictions", R="tdf2026_results"; let onP=()=>{}, onR=()=>{};
  return {
    async start(cbP,cbR){ onP=cbP;onR=cbR; onP(read(P)||{}); onR(read(R)||{}); },
    async savePrediction(slug,data){ const all=read(P)||{}; all[slug]={...(all[slug]||{}),...data}; localStorage.setItem(P,JSON.stringify(all)); onP(all); },
    async saveResults(data){ const cur=read(R)||{}; const next={...cur,...data}; localStorage.setItem(R,JSON.stringify(next)); onR(next); }
  };
}
async function firebaseBackend(){
  const appMod=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const fs=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const app=appMod.initializeApp(firebaseConfig); const db=fs.getFirestore(app);
  const predCol=fs.collection(db,"tdf2026_predictions"); const resDoc=fs.doc(db,"tdf2026_results","main");
  return {
    async start(cbP,cbR){
      fs.onSnapshot(predCol, snap=>{ const o={}; snap.forEach(d=>o[d.id]=d.data()); cbP(o); });
      fs.onSnapshot(resDoc, d=> cbR(d.exists()? d.data() : {}));
    },
    async savePrediction(slug,data){ await fs.setDoc(fs.doc(db,"tdf2026_predictions",slug), data, {merge:true}); },
    async saveResults(data){ await fs.setDoc(resDoc, data, {merge:true}); }
  };
}

/* ============ STANDINGS ============ */
function scoreOf(p){
  const b={}; let jp=0, sp=0;
  const hit=(k,pts)=>{ const g=results[k]&&p[k]&&norm(results[k])===norm(p[k]); b[k]={hit:!!g,pts:g?pts:0}; if(g) jp+=pts; };
  hit("yellow",25); hit("green",15); hit("polka",15); hit("white",15); hit("gc2",10); hit("gc3",10);
  const bg=results.beatPog&&p.beatPog&&results.beatPog===p.beatPog; b.beatPog={hit:!!bg,pts:bg?10:0}; if(bg) jp+=10;
  const sw=results.stageWinners||{}, ps=p.stages||{}; let sc=0;
  STAGE_LIST.forEach(st=>{ if(sw[st.n]&&ps[st.n]&&norm(sw[st.n])===norm(ps[st.n])){ sp+=STAGE_PTS; sc++; } });
  return {b, jersey:jp, stage:sp, stageCount:sc, total:jp+sp};
}
function renderBoard(){
  const list=Object.values(preds), sec=$("#board");
  if(!list.length){ sec.innerHTML=`<div class="card"><div class="empty">${esc(t("board_empty"))}</div></div>`; return; }
  const hasRes=Object.keys(results).some(k=>k!=="stageWinners")||(results.stageWinners&&Object.keys(results.stageWinners).length);
  const rows=list.map(p=>({p,...scoreOf(p)}));
  rows.sort((a,b)=>{
    if(b.total!==a.total) return b.total-a.total;
    if(results.pogWins!=null){ const da=a.p.pogWins==null?99:Math.abs(a.p.pogWins-results.pogWins), db=b.p.pogWins==null?99:Math.abs(b.p.pogWins-results.pogWins); if(da!==db) return da-db; }
    return (a.p.name||"").localeCompare(b.p.name||"");
  });
  const order=["yellow","green","polka","white","gc2","gc3","beatPog"];
  const sw={yellow:"var(--jaune)",green:"var(--vert)",polka:"var(--pois)",white:"#fff",gc2:"var(--ink)",gc3:"var(--ink-soft)",beatPog:"var(--pois)"};
  let h=`<div class="card">`;
  if(!hasRes) h+=`<p class="hint" style="margin:0 0 10px">${esc(t("board_pending"))}</p>`;
  rows.forEach((r,i)=>{
    const mini=order.map(k=>{ const on=hasRes&&r.b[k]&&r.b[k].hit;
      return `<i class="${on?"":"miss"}" style="background:${sw[k]};${k==="white"?"box-shadow:inset 0 0 0 1px var(--line)":""}"></i>`; }).join("");
    const stagedone=Object.keys(r.p.stages||{}).length;
    const sub=hasRes? t("sub_scored",{j:r.jersey,s:r.stage,c:r.stageCount}) : t("sub_picked",{n:stagedone});
    const brk=order.map(k=>{ const pick=k==="beatPog"?(r.p.beatPog==="yes"?t("yes_upset"):r.p.beatPog==="no"?t("no_pogi"):"—"):r.p[k];
      const cls=hasRes?(r.b[k]&&r.b[k].hit?"g":"x"):"x";
      return `<span class="${cls}">${esc(pick||"—")}</span><span class="${cls}" style="text-align:right">${hasRes?(r.b[k]&&r.b[k].hit?"+"+r.b[k].pts:"0"):""}</span>`; }).join("");
    h+=`<div class="lb-row ${i===0&&hasRes?"lead":""}">
        <div class="rank">${hasRes?i+1:"·"}</div>
        <div><div class="who">${esc(r.p.name||"—")}</div>
          <div class="subline">${esc(sub)}${r.p.pogWins!=null?` · Pogi ${r.p.pogWins}`:""}</div>
          <div class="mini">${mini}</div></div>
        <div class="score">${hasRes?r.total:"—"}<small>${hasRes?esc(t("pts")):esc(t("pending"))}</small></div></div>
      <details class="brk"><summary>${esc(t("jersey_card",{name:r.p.name||"—"}))}</summary><div class="brk-grid">${brk}</div></details>`;
  });
  h+=`</div>`;
  sec.innerHTML=h;
}

/* ============ RESULTS (PIN 2468) ============ */
let unlocked=false;
function renderResults(){
  const sec=$("#results");
  if(!unlocked){
    sec.innerHTML=`<div class="card"><div class="gate">
      <div class="card-h" style="justify-content:center">${jersey("var(--jaune)")}
        <div><div class="t">${esc(t("results_desk"))}</div><div class="s">${esc(t("pin_prompt"))}</div></div></div>
      <input type="password" id="pin" inputmode="numeric" placeholder="••••" maxlength="8">
      <div class="saved-flag" id="pinmsg"></div></div></div>`;
    const pin=$("#pin");
    pin.oninput=()=>{ if(pin.value==="2468"){ unlocked=true; renderResults(); } else if(pin.value.length>=4){ $("#pinmsg").textContent=t("pin_wrong"); } };
    return;
  }
  const r=results, sworn=r.stageWinners||{}; let h="";
  h+=`<div class="card"><p class="hint" style="margin:0">${esc(t("auto_note"))}</p></div>`;
  JERSEYS.forEach(j=>{
    const cur=r[j.key]||"", isOther=cur&&!j.pool.includes(cur);
    h+=`<div class="card"><div class="card-h">${jersey(j.css)}<div><div class="t">${j.name}</div><div class="s">${esc(t("final_winner"))}</div></div></div>
      <select data-res="${j.key}">${selOptions(j.pool,cur)}</select>
      <input class="other" type="text" data-rother="${j.key}" placeholder="${esc(t("type_name"))}" value="${isOther?esc(cur):""}" ${isOther?"":"hidden"}></div>`;
  });
  h+=`<div class="card"><div class="card-h">${jersey("var(--ink)")}<div><div class="t">${esc(t("podium"))}</div><div class="s">${esc(t("final_23"))}</div></div></div>
    <div class="twocol"><div><label class="fld">${esc(t("second"))}</label><select data-res="gc2">${selOptions(GC,r.gc2||"")}</select></div>
      <div><label class="fld">${esc(t("third"))}</label><select data-res="gc3">${selOptions(GC,r.gc3||"")}</select></div></div></div>`;
  h+=`<div class="card"><div class="card-h">${jersey("var(--pois)")}<div><div class="t">${esc(t("outcome"))}</div><div class="s">${esc(t("beat_q"))}</div></div></div>
    <div class="seg-toggle" id="rBeat"><button data-rbp="yes" aria-pressed="${r.beatPog==="yes"}">${esc(t("yes"))}</button><button data-rbp="no" aria-pressed="${r.beatPog==="no"}">${esc(t("no"))}</button></div>
    <div style="margin-top:14px"><label class="fld">${esc(t("pog_actual"))}</label>
      <input type="number" id="rPog" min="0" max="10" value="${r.pogWins??""}" placeholder="0–10"></div></div>`;
  h+=`<div class="card"><div class="card-h">${jersey("var(--jaune)")}<div><div class="t">${esc(t("stage_winners"))}</div><div class="s">${esc(t("fill_after"))}</div></div></div>`;
  STAGE_LIST.forEach(st=>{
    const cur=sworn[st.n]||"", isOther=cur&&!STAGE_POOL.includes(cur);
    h+=`<div class="stage"><div class="num">${st.n}</div><div class="meta">
        <div class="top"><span class="rte">${esc(st.a)} › ${esc(st.b)}</span><span class="chip ${st.t}">${esc(chipLabel(st.t))}</span></div>
        <select data-rstage="${st.n}">${selOptions(STAGE_POOL,cur)}</select>
        <input class="other" type="text" data-rsother="${st.n}" placeholder="${esc(t("type_name"))}" value="${isOther?esc(cur):""}" ${isOther?"":"hidden"}></div></div>`;
  });
  h+=`</div><button class="cta" id="saveRes" style="background:var(--vert);color:#fff">${esc(t("publish"))}</button><div class="saved-flag" id="resmsg"></div>`;
  sec.innerHTML=h;
  wireResults();
}
function wireResults(){
  window.__res={...results, stageWinners:{...(results.stageWinners||{})}};
  $("#results").querySelectorAll("select[data-res]").forEach(s=> s.onchange=e=>{
    const k=e.target.dataset.res, v=e.target.value, o=$("#results").querySelector(`input[data-rother="${k}"]`);
    if(v==="__other"){ if(o){o.hidden=false;o.focus();} window.__res[k]=""; } else { if(o){o.hidden=true;o.value="";} window.__res[k]=v; }
  });
  $("#results").querySelectorAll("input[data-rother]").forEach(i=> i.oninput=e=> window.__res[e.target.dataset.rother]=e.target.value.trim());
  $("#results").querySelectorAll("select[data-rstage]").forEach(s=> s.onchange=e=>{
    const n=e.target.dataset.rstage, v=e.target.value, o=$("#results").querySelector(`input[data-rsother="${n}"]`);
    if(v==="__other"){ if(o){o.hidden=false;o.focus();} delete window.__res.stageWinners[n]; }
    else if(v===""){ if(o){o.hidden=true;o.value="";} delete window.__res.stageWinners[n]; }
    else { if(o){o.hidden=true;o.value="";} window.__res.stageWinners[n]=v; }
  });
  $("#results").querySelectorAll("input[data-rsother]").forEach(i=> i.oninput=e=>{
    const n=e.target.dataset.rsother, v=e.target.value.trim(); if(v) window.__res.stageWinners[n]=v; else delete window.__res.stageWinners[n];
  });
  document.querySelectorAll("#rBeat button").forEach(b=> b.onclick=()=>{ window.__res.beatPog=b.dataset.rbp;
    document.querySelectorAll("#rBeat button").forEach(x=>x.setAttribute("aria-pressed",x===b)); });
  $("#rPog").oninput=e=> window.__res.pogWins=e.target.value===""?null:Math.max(0,Math.min(10,parseInt(e.target.value)||0));
  $("#saveRes").onclick=async()=>{ const m=$("#resmsg");
    try{ await backend.saveResults(window.__res); m.textContent=t("published"); m.style.color="var(--vert)"; }
    catch(e){ m.textContent=t("save_fail"); m.style.color="var(--pois)"; }
  };
}

/* ============ SHELL ============ */
function activeTab(){ return document.querySelector('.tab[aria-selected="true"]').dataset.tab; }
function refresh(){ const x=activeTab(); if(x==="predict")renderPredict(); else if(x==="stages")renderStages(); else if(x==="board")renderBoard(); else if(x==="results"&&!unlocked)renderResults(); }
function tabTo(name){
  document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected",t.dataset.tab===name));
  ["predict","stages","board","results"].forEach(s=> $("#"+s).hidden=s!==name);
  if(name==="predict")renderPredict(); if(name==="stages")renderStages(); if(name==="board")renderBoard(); if(name==="results")renderResults();
}
document.querySelectorAll(".tab").forEach(tb=> tb.onclick=()=>tabTo(tb.dataset.tab));

function applyStatic(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=> el.textContent=t(el.dataset.i18n));
  document.querySelectorAll("[data-i18n-ph]").forEach(el=> el.placeholder=t(el.dataset.i18nPh));
  $("#title").textContent=POOL_NAME; document.title=POOL_NAME;
  setLive(CONFIGURED);
}
function setLang(l){
  if(!I18N[l]) return; lang=l; try{ localStorage.setItem("tdf2026_lang",l); }catch(e){}
  document.querySelectorAll("#langsw button").forEach(b=> b.setAttribute("aria-pressed", b.dataset.lang===l));
  applyStatic(); refresh();
}
document.querySelectorAll("#langsw button").forEach(b=> b.onclick=()=>setLang(b.dataset.lang));

$("#me").oninput=e=>{ me=e.target.value; try{ localStorage.setItem("tdf2026_me",me); }catch(err){} refresh(); };
function countdown(){ const el=$("#cd"), d=LOCK.getTime()-Date.now(); el.textContent=d<=0?"LIVE":Math.floor(d/86400000)+"d"; }
function setLive(on){ const l=$("#live"); l.classList.toggle("on",on); $("#livetxt").textContent=on?t("live"):t("local"); }
function setupBanner(){ if(CONFIGURED) return;
  $("#setup").innerHTML=`<div class="card"><p class="hint" style="margin:0">Demo mode — add Firebase config for the shared pool.</p></div>`;
}

(async function boot(){
  $("#me").value=me;
  document.querySelectorAll("#langsw button").forEach(b=> b.setAttribute("aria-pressed", b.dataset.lang===lang));
  applyStatic(); setupBanner(); countdown(); setInterval(countdown,60000);
  backend = CONFIGURED ? await firebaseBackend() : localBackend();
  await backend.start(p=>{ preds=p||{}; refresh(); }, r=>{ results=r||{}; refresh(); });
  setLive(CONFIGURED); renderPredict();
})().catch(err=>{
  console.error(err);
  $("#setup").innerHTML=`<div class="card"><p class="hint" style="margin:0">Connection error — check the Firebase config. Running locally for now.</p></div>`;
  backend=localBackend(); backend.start(p=>{preds=p;refresh();}, r=>{results=r;refresh();}); applyStatic(); renderPredict();
});
</script>
